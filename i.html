<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>六十四卦 XOR オートマトン</title>
<style>
body{
    font-family: monospace;
    background:#f5f5f5;
    padding:5dvb;
}
.row{
    display:flex;
    gap:10px;
    align-items:center;
    margin-bottom:10px;
    flex-wrap:wrap;
}
textarea{
    width:100%;
    height:80px;
    font-family: monospace;
    font-size:60px;
}
button,select,input{
    font-size:60px;
    padding:6px;
}
#programText{
    background:white;
    border:1px solid #888;
    padding:10px;
    min-height:40px;
    white-space:pre-wrap;
    word-break:break-all;
}
#hexagramDisplay{
    font-size:200px;
    text-align:center;
    margin:20px 0;
    background:white;
    border:1px solid #888;
    padding:20px;
}
#resultArea{
    background:white;
    border:1px solid #888;
    padding:10px;
    min-height:80px;
    white-space:pre-wrap;
    overflow-x:auto;
}
.line{
    font-size:60px;
    margin-bottom:8px;
}
.numline{
    font-size:60px;
}
</style>
</head>
<body>
<textarea id="programText" placeholder="空"></textarea>
<div class="row">
    <button id="runButton">実行</button>
    <select id="speedSelect">
        <option value="100">0.1秒ごと</option>
        <option value="500"  selected>0.5秒ごと</option>
        <option value="1000">1秒ごと</option>
        <option value="2000">2秒ごと</option>
    </select>
</div>
<div id="hexagramDisplay">䷁</div>
<div class="row">
    <button id="modeButton">10進/16進切替</button>
</div>
<div id="resultArea">
    <div class="line" id="resultHex"></div>
    <div class="numline" id="resultNum"></div>
</div>
<script>

addEventListener("load", (event) => {
	if (window.innerHeight>window.innerWidth){
		document.getElementById
	}
});


let program = [];
let editIndex = 0;
let calcValue = 0;
let running = false;
let displayHex = false;

// =========================
// 6bit → 六十四卦
// =========================


/* 6bit(binary) -> Unicode六十四卦
   000000 を ䷁(坤) にする binary order の対応表 */
const HEXAGRAM_BY_BINARY = {
  "111111": "䷀", // 01 乾
  "000000": "䷁", // 02 坤
  "010001": "䷂", // 03 屯
  "100010": "䷃", // 04 蒙
  "010111": "䷄", // 05 需
  "111010": "䷅", // 06 訟
  "000010": "䷆", // 07 師
  "010000": "䷇", // 08 比
  "110111": "䷈", // 09 小畜
  "111011": "䷉", // 10 履
  "000111": "䷊", // 11 泰
  "111000": "䷋", // 12 否
  "111101": "䷌", // 13 同人
  "101111": "䷍", // 14 大有
  "000100": "䷎", // 15 謙
  "001000": "䷏", // 16 豫
  "011001": "䷐", // 17 隨
  "100110": "䷑", // 18 蠱
  "000011": "䷒", // 19 臨
  "110000": "䷓", // 20 觀
  "101001": "䷔", // 21 噬嗑
  "100101": "䷕", // 22 賁
  "100000": "䷖", // 23 剝
  "000001": "䷗", // 24 復
  "111001": "䷘", // 25 無妄
  "100111": "䷙", // 26 大畜
  "100001": "䷚", // 27 頤
  "011110": "䷛", // 28 大過
  "010010": "䷜", // 29 坎
  "101101": "䷝", // 30 離
  "011100": "䷞", // 31 咸
  "001110": "䷟", // 32 恆
  "111100": "䷠", // 33 遯
  "001111": "䷡", // 34 大壯
  "101000": "䷢", // 35 晉
  "000101": "䷣", // 36 明夷
  "110101": "䷤", // 37 家人
  "101011": "䷥", // 38 睽
  "010100": "䷦", // 39 蹇
  "001010": "䷧", // 40 解
  "100011": "䷨", // 41 損
  "110001": "䷩", // 42 益
  "011111": "䷪", // 43 夬
  "111110": "䷫", // 44 姤
  "011000": "䷬", // 45 萃
  "000110": "䷭", // 46 升
  "011010": "䷮", // 47 困
  "010110": "䷯", // 48 井
  "011101": "䷰", // 49 革
  "101110": "䷱", // 50 鼎
  "001001": "䷲", // 51 震
  "100100": "䷳", // 52 艮
  "110100": "䷴", // 53 漸
  "001011": "䷵", // 54 歸妹
  "001101": "䷶", // 55 豐
  "101100": "䷷", // 56 旅
  "110110": "䷸", // 57 巽
  "011011": "䷹", // 58 兌
  "110010": "䷺", // 59 渙
  "010011": "䷻", // 60 節
  "110011": "䷼", // 61 中孚
  "001100": "䷽", // 62 小過
  "010101": "䷾", // 63 既濟
  "101010": "䷿"  // 64 未濟
};

const BINARY_BY_HEXAGRAM = Object.fromEntries(
  Object.entries(HEXAGRAM_BY_BINARY).map(([bits, ch]) => [ch, bits])
);

function normalizeBits(bits) {
  return String(bits).replace(/[^01]/g, "").padStart(6, "0").slice(-6);
}

function bitsToHexagram(bits) {
  return HEXAGRAM_BY_BINARY[normalizeBits(bits)] ?? "？";
}

function hexagramToBits(ch) {
  return BINARY_BY_HEXAGRAM[ch] ?? "000000";
}

function valueToHexagram(value) {
  return bitsToHexagram((value & 63).toString(2));
}

function hexagramToValue(ch) {
  return parseInt(hexagramToBits(ch), 2);
}

/* 使い方:
   bitsToHexagram("010011") -> ䷻
   hexagramToBits("䷻")      -> "010011"
   valueToHexagram(19)      -> ䷒
*/

// =========================
// 結果追加
// =========================
function appendResult(value){
    let bits = value.toString(2).padStart(6,"0");
    let hexagram = bitsToHexagram(bits);
    document.getElementById("hexagramDisplay").textContent = hexagram;
    let resultHex = document.getElementById("resultHex");
    let resultNum = document.getElementById("resultNum");
    resultHex.textContent += hexagram + " ";
    if(displayHex){
        resultNum.textContent += value.toString(16).padStart(2,"0") + " ";
    }else{
        resultNum.textContent += value.toString(10).padStart(2,"0") + " ";
    }
}

// =========================
// 入力追加
// =========================

function splitProgram(){
  let input = document.getElementById("programText").value;
	let p= input.split(" ");
	for (i of p){
		if(!/^[01]{6}$/.test(i)){
        alert("6文字の0と1で入力");
        return;
    }
	}
	program=p;
}



// =========================
// 実行
// =========================
async function runProgram(){
    if(running) {program=[]; document.getElementById("runButton").textContent = "実行"; return};
    running = true;
    calcValue = 0;
    document.getElementById("resultHex").textContent = "";
    document.getElementById("resultNum").textContent = "";
		splitProgram();
    let pc = 0;
    let speed = parseInt(
        document.getElementById("speedSelect").value
    );
		if (program.length==0){running=false; return;}
		document.getElementById("runButton").textContent = "停止"
    while(pc < program.length){
        let instr = program[pc];
        await sleep(speed);
            let mask = parseInt(instr,2);
            calcValue ^= mask;
            calcValue &= 63;
            appendResult(calcValue);
        pc++;
    }
    running = false;
		document.getElementById("runButton").textContent = "実行"
		program=[];
	document.getElementById("hexagramDisplay").textContent = "䷁"
	
}

// =========================
// sleep
// =========================
function sleep(ms){
    return new Promise(resolve=>setTimeout(resolve,ms));
}

// =========================
// ボタン
// =========================

document.getElementById("runButton")
.addEventListener("click",runProgram);
document.getElementById("modeButton")
.addEventListener("click",()=>{
    displayHex = !displayHex;
    let nums = [];
    let hexes =
        document.getElementById("resultHex")
        .textContent
        .trim()
        .split(/\s+/);
    for(let h of hexes){
        if(!h) continue;
        let bits = hexagramToBits(h);
        let value = parseInt(bits,2);
        if(displayHex){
            nums.push(
                value.toString(16).padStart(2,"0")
            );
        }else{
            nums.push(
                value.toString(10).padStart(2,"0")
            );
        }
    }
    document.getElementById("resultNum").textContent =
        nums.join(" ");
});


</script>
</body>
</html>
